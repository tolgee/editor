name: Release

on:
  workflow_run:
    workflows: [ "Test" ]
    branches: [ "main", "next" ]
    types:
      - completed

# Trusted Publishers for npm via GitHub Actions OIDC
permissions:
  id-token: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  main:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run npm release
        run: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
